name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Create symlinks in releases folder
        shell: pwsh
        run: |
          $bundleDir = Resolve-Path "src-tauri/target/${{ matrix.target }}/release/bundle"
          New-Item -ItemType Directory -Force -Path "releases/${{ matrix.arch }}"
          foreach ($sub in @("nsis", "msi")) {
            $src = Join-Path $bundleDir $sub
            if (Test-Path $src) {
              New-Item -ItemType SymbolicLink `
                -Path "releases/${{ matrix.arch }}/$sub" `
                -Target $src
            }
          }

      - name: Upload releases artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comic-viewer-windows-${{ matrix.arch }}
          path: releases/${{ matrix.arch }}/
          if-no-files-found: warn

  collect:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: comic-viewer-windows-x64
          path: releases/x64

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: comic-viewer-windows-arm64
          path: releases/arm64

      - name: Upload combined releases folder
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: releases/
